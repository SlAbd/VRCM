name: Build and Deploy Static Next.js to cPanel

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint
        continue-on-error: true

      - name: Build static Next.js project
        run: npm run build
        env:
          NODE_ENV: production

      - name: Prepare cPanel deployment files
        run: |
          rm -rf cpanel-dist
          mkdir cpanel-dist

          cp -R out cpanel-dist/out
          cp .cpanel.yml cpanel-dist/.cpanel.yml

      - name: Push static build to cpanel-deploy branch
        run: |
          cd cpanel-dist

          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b cpanel-deploy

          git add -A
          git commit -m "Deploy static cPanel build from $GITHUB_SHA"

          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push --force origin cpanel-deploy