name: Build and Deploy Static Next.js to cPanel

on:
  push:
    branches:
      - master

permissions:
  contents: write

concurrency:
  group: cpanel-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: master
          path: source
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: source/package-lock.json

      - name: Install dependencies
        working-directory: source
        run: npm ci

      - name: Run linter
        working-directory: source
        run: npm run lint
        continue-on-error: true

      - name: Build static Next.js project
        working-directory: source
        run: npm run build
        env:
          NODE_ENV: production

      - name: Checkout cpanel-deploy branch
        uses: actions/checkout@v4
        with:
          ref: cpanel-deploy
          path: deploy
          fetch-depth: 0

      - name: Prepare deployment branch
        run: |
          cd deploy

          find . -mindepth 1 \
            ! -path './.git' \
            ! -path './.git/*' \
            -exec rm -rf {} +

          mkdir -p out
          cp -R ../source/out/* out/
          cp ../source/.cpanel.yml .cpanel.yml

      - name: Commit and push deployment
        run: |
          cd deploy

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to deploy"
          else
            git commit -m "Deploy static build from $GITHUB_SHA"
            git push origin cpanel-deploy
          fi