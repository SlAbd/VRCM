name: Build and Deploy to cPanel

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: write

concurrency:
  group: cpanel-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint
        continue-on-error: true

      - name: Build Next.js project
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_IGNORE_ESLINT: true

      - name: Update Passenger restart file
        run: node scripts/touch-restart.js

      - name: Prepare cPanel deployment files
        if: github.event_name == 'push'
        run: |
          rm -rf cpanel-dist
          mkdir cpanel-dist

          rsync -av ./ cpanel-dist/ \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='cpanel-dist' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='.next/cache'

          test -f cpanel-dist/.next/BUILD_ID

      - name: Push compiled app to cpanel-deploy branch
        if: github.event_name == 'push'
        run: |
          cd cpanel-dist

          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b cpanel-deploy

          git add -A
          git add -f .next
          git add -f tmp/restart.txt

          git commit -m "Deploy cPanel build from $GITHUB_SHA"

          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push --force origin cpanel-deploy